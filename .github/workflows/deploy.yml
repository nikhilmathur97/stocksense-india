name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy'
        required: false
        default: 'all'
        type: choice
        options: [all, backend, frontend]

env:
  # Non-secret project IDs — safe to commit
  RAILWAY_PROJECT_ID: 8877d5e4-9029-41ef-a242-d9489569fba4
  RAILWAY_SERVICE_ID: 00bf1942-eeeb-44b0-b7e9-5ac3ed5b99aa
  RAILWAY_ENVIRONMENT_ID: b71af091-c9a8-464f-b362-e61cf051be34
  VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
  VERCEL_PROJECT_ID: prj_GeH3IdZ3KiQW8RmbR0IGMCuEfj28
  BACKEND_URL: https://backend-production-4344.up.railway.app
  FRONTEND_URL: https://stocksense-india-two.vercel.app

jobs:
  # ── Detect what changed ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'engine/**'
              - 'database/**'
              - 'Dockerfile.railway'
              - 'railway.toml'
            frontend:
              - 'frontend/**'

  # ── Deploy backend to Railway ─────────────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.service == 'backend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy & wait for healthy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project $RAILWAY_PROJECT_ID \
            --service $RAILWAY_SERVICE_ID \
            --environment $RAILWAY_ENVIRONMENT_ID \
            --detach
          echo "Build triggered — polling health endpoint..."
          sleep 90
          for i in $(seq 1 12); do
            STATUS=$(curl -sf $BACKEND_URL/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Backend healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i: $STATUS — retrying in 15s"
            sleep 15
          done
          echo "Backend did not become healthy within 3 minutes"
          exit 1

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}

      - name: Smoke-test frontend
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL)
          echo "Frontend returned HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1

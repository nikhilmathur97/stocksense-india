name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy'
        required: false
        default: 'all'
        type: choice
        options: [all, frontend]

env:
  # Non-secret project identifiers — safe to commit
  VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
  VERCEL_PROJECT_ID: prj_GeH3IdZ3KiQW8RmbR0IGMCuEfj28
  BACKEND_URL: https://backend-production-4344.up.railway.app
  FRONTEND_URL: https://stocksense-india-two.vercel.app

jobs:
  # ── Detect what changed ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'engine/**'
              - 'database/**'
              - 'Dockerfile.railway'
              - 'railway.toml'
            frontend:
              - 'frontend/**'

  # ── Backend: Railway auto-deploys via GitHub integration ──────────────────────
  # Railway is connected to this repo and rebuilds automatically on push to main.
  # This job just waits until the Railway-triggered build is healthy.
  verify-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway build + health check
        run: |
          echo "Railway build triggered automatically by push. Polling health..."
          sleep 120
          for i in $(seq 1 15); do
            STATUS=$(curl -sf $BACKEND_URL/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Backend healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i: waiting... retrying in 20s"
            sleep 20
          done
          echo "Backend did not become healthy within 5 minutes"
          exit 1

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}

      - name: Smoke-test frontend
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL)
          echo "Frontend returned HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1

version: '3.9'

services:
  # ── TimescaleDB (PostgreSQL + time-series extension) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: stockdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
      TIMESCALEDB_TELEMETRY: 'off'
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stockdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocknet

  # ── Redis (Cache + Pub/Sub) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockredis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocknet

  # ── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockbackend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://stockuser:stockpass@timescaledb:5432/stockdb
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./engine:/app/engine
      - ./pipeline:/app/pipeline
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stocknet
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockfrontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - stocknet

  # ── Data Pipeline Scheduler ──────────────────────────
  pipeline:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockpipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stockuser:stockpass@timescaledb:5432/stockdb
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - ./engine:/app/engine
      - ./pipeline:/app/pipeline
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stocknet
    command: python pipeline/scheduler.py

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local

networks:
  stocknet:
    driver: bridge
